<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediaWise Quiz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --primary: #7c3aed;
      --secondary: #06b6d4;
      --text: #f8fafc;
      --muted: #94a3b8;
      --gold: #facc15;
      --radius: 24px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a 45%);
      color: var(--text);
      overflow-x:hidden;
    }

    .back-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 1000;

      text-decoration: none;
      color: white;

      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);

      padding: 0.8rem 1.2rem;
      border-radius: 14px;

      backdrop-filter: blur(20px);

      transition: 0.3s;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.12);
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:120px 20px 80px;
    }

    h1{
      text-align:center;
      font-size:clamp(3rem, 6vw, 4.5rem);
      line-height:1.05;
      margin-bottom:1.5rem;
    }

    h1 span{
      background: linear-gradient(to right, #a78bfa, #22d3ee);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      max-width:700px;
      margin:auto;
      margin-bottom:4rem;
      line-height:1.8;
      font-size:1.1rem;
    }

    .question{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:28px;
      padding:2rem;
      margin-bottom:1.8rem;
      backdrop-filter:blur(20px);
      transition:0.3s;
    }

    .question:hover{
      transform:translateY(-4px);
      border-color:rgba(255,255,255,0.2);
    }

    .question h3{
      color:#c4b5fd;
      font-size:0.9rem;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:1rem;
    }

    .question p{
      font-size:1.15rem;
      font-weight:600;
      margin-bottom:1.5rem;
      line-height:1.6;
    }

    label{
      display:block;
      padding:1rem 1rem;
      border-radius:16px;
      margin-bottom:0.8rem;
      cursor:pointer;
      color:#e2e8f0;
      transition:0.25s;
      border:1px solid transparent;
    }

    label:hover{
      background:rgba(255,255,255,0.05);
      border-color:rgba(255,255,255,0.08);
      transform:translateX(4px);
    }

    input[type="radio"]{
      margin-right:12px;
      accent-color:var(--secondary);
    }

    .submit-wrap{
      text-align:center;
      margin-top:3rem;
    }

    button,
    .result a{
      background:linear-gradient(to right, var(--primary), var(--secondary));
      color:white;
      border:none;
      padding:1rem 1.6rem;
      border-radius:14px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
      text-decoration:none;
      display:inline-block;
      margin-top:1.5rem;
    }

    button:hover,
    .result a:hover{
      transform:translateY(-3px);
      opacity:0.9;
    }

    .result{
      display:none;
      margin-top:4rem;
      padding:3rem;
      background:var(--card);
      border-radius:28px;
      border:1px solid var(--border);
      backdrop-filter:blur(20px);
      text-align:center;
    }

    .result h2{
      margin-bottom:1rem;
    }

    .category{
      font-size:2rem;
      color:var(--gold);
      font-weight:800;
      margin:1rem 0;
      letter-spacing:1px;
    }

    .result p{
      color:var(--muted);
      line-height:1.8;
      max-width:650px;
      margin:auto;
    }

    footer{
      padding:2rem 8%;
      border-top:1px solid var(--border);
      color:var(--muted);
      text-align:center;
      margin-top:5rem;
    }

    @media(max-width:700px){

      .container{
        padding-top:120px;
      }

      h1{
        font-size:3rem;
      }

      .question p{
        font-size:1rem;
      }

      .back-btn{
        top:16px;
        left:16px;
      }
    }

  </style>
</head>

<body>

<a href="index.html" class="back-btn">← Back</a>

<div class="container">

  <h1>
    Media Literacy <span>Diagnostic Quiz</span>
  </h1>

  <p class="subtitle">
    Evaluate how you interpret evidence, recognize bias, analyze graphs,
    detect manipulation techniques, and navigate digital information critically.
  </p>

  <form id="quizForm"></form>

  <div class="submit-wrap">
    <button type="button" onclick="submitQuiz()">Submit Quiz</button>
  </div>

  <div id="result" class="result"></div>

</div>

<footer>
  © 2026 MediaWise • Built for modern digital education
</footer>

<script>

const questions = [

  {
    q: "Which is the strongest evidence for the claim 'Teen sleep improves when school starts later'?",
    options: [
      "My cousin sleeps better now.",
      "A survey of 20 students from one school",
      "A large multi-school study comparing sleep before and after start-time changes",
      "A podcast host saying it makes sense"
    ],
    answer: 2
  },

  {
    q: "Ice cream sales and drowning incidents both rise in summer. Best conclusion?",
    options: [
      "Ice cream causes drowning",
      "Drowning causes people to buy ice cream",
      "Warm weather may explain both",
      "The chart must be fake"
    ],
    answer: 2
  },

  {
    q: "Three people regret college, therefore college is no longer worth it. Problem?",
    options: [
      "Uses anecdotes to make a broad claim",
      "Too many statistics",
      "Neutral statement",
      "Definitely AI-generated"
    ],
    answer: 0
  },

  {
    q: "A chart exaggerates 51% vs 49% by starting the y-axis at 48%. What's misleading?",
    options: [
      "Data is impossible",
      "The y-axis exaggerates a small difference",
      "Needs brighter colors",
      "Title is too short"
    ],
    answer: 1
  },

  {
    q: "A graph has no scale, timeframe, or source. What should viewers ask?",
    options: [
      "Why is the line red?",
      "What data, scale, timeframe, and source are being used?",
      "Is the graph too simple?",
      "Was it made with AI?"
    ],
    answer: 1
  },

  {
    q: "Showing only one bad week in a stock graph ignores 5-year growth. Technique?",
    options: [
      "Cherry-picking timeframe",
      "Too many sources",
      "Avoiding emotional language",
      "Citing primary data"
    ],
    answer: 0
  },

  {
    q: "A dual-axis chart makes two trends look strongly related. Be cautious because:",
    options: [
      "Visuals may exaggerate the relationship",
      "The relationship must be causal",
      "Two-line charts are invalid",
      "It proves causation"
    ],
    answer: 0
  },

  {
    q: "A scientist quote was clipped out of context. What happened?",
    options: [
      "Taken out of context",
      "Scientist changed their mind",
      "Clip proves the claim",
      "Full video is irrelevant"
    ],
    answer: 0
  },

  {
    q: "An immigration article only discusses crime examples. What bias may this show?",
    options: [
      "Selection bias",
      "Typographical bias",
      "Scientific bias",
      "Formatting bias"
    ],
    answer: 0
  },

  {
    q: "Which sentence has the most negative slant?",
    options: [
      "The city increased parking fees by 10%",
      "The city adjusted parking fees as part of its new budget",
      "The city imposed yet another burden on drivers",
      "Parking fees will rise from $2.00 to $2.20"
    ],
    answer: 2
  },

  {
    q: "Giving equal space to experts and non-experts on climate change may create:",
    options: [
      "False balance",
      "Too much evidence",
      "Lack of opinion",
      "Too much transparency"
    ],
    answer: 0
  },

  {
    q: "A headline sounds absurd. What should you check first?",
    options: [
      "Whether the site is satire or parody",
      "Whether the headline is short",
      "Whether it mentions the economy",
      "Whether it has comments"
    ],
    answer: 0
  },

  {
    q: "Why can satire be mistaken for misinformation?",
    options: [
      "It imitates news while exaggerating reality",
      "It always uses fake statistics",
      "It is illegal",
      "It never has sources"
    ],
    answer: 0
  },

  {
    q: "Best combination for understanding a health policy issue?",
    options: [
      "Only a personal blog",
      "Government agency + detailed news reporting",
      "Only social media comments",
      "Whatever confirms your beliefs"
    ],
    answer: 1
  },

  {
    q: "An article claims a report proves crime doubled. What should you look for?",
    options: [
      "The original report or dataset",
      "A more dramatic headline",
      "Comment section",
      "A repost with more likes"
    ],
    answer: 0
  },

  {
    q: "A headline says risk increased 100%, but it went from 1 in 10,000 to 2 in 10,000. Misleading because:",
    options: [
      "Uses relative risk without absolute risk",
      "Too many numbers",
      "Medication has no effect",
      "Headline is neutral"
    ],
    answer: 0
  },

  {
    q: "Using an unrelated emotional image beside a political claim is:",
    options: [
      "Emotional misattribution",
      "Peer review",
      "Scientific sampling",
      "Neutral framing"
    ],
    answer: 0
  }

];

const form = document.getElementById("quizForm");

questions.forEach((question, index) => {

  const div = document.createElement("div");

  div.className = "question";

  div.innerHTML = `
    <h3>Question ${index + 1}</h3>
    <p>${question.q}</p>

    ${question.options.map((opt, i) => `
      <label>
        <input type="radio" name="q${index}" value="${i}">
        ${opt}
      </label>
    `).join("")}
  `;

  form.appendChild(div);

});

function submitQuiz(){

  let score = 0;

  questions.forEach((q, index) => {

    const selected = document.querySelector(
      `input[name="q${index}"]:checked`
    );

    if(selected && Number(selected.value) === q.answer){
      score++;
    }

  });

  let category = "";
  let description = "";
  let pageLink = "";
  let buttonText = "";

  if(score <= 9){

    category = "Beginner Track";

    description =
      "You are developing foundational media literacy skills. Focus on identifying misleading framing, checking evidence quality, and recognizing bias patterns online.";

    pageLink = "beginner.html";
    buttonText = "Go to Beginner Course";

  } else {

    category = "Intermediate Track";

    description =
      "You demonstrate strong critical analysis skills across media, evidence evaluation, graph interpretation, and misinformation detection.";

    pageLink = "intermediate.html";
    buttonText = "Go to Intermediate Course";
  }

  const resultDiv = document.getElementById("result");

  resultDiv.style.display = "block";

  resultDiv.innerHTML = `
    <h2>Your Score: ${score} / ${questions.length}</h2>

    <div class="category">${category}</div>

    <p>${description}</p>

    <a href="${pageLink}">
      ${buttonText}
    </a>
  `;

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });

}

</script>

</body>
</html>
